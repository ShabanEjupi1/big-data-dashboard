<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Big Data Analytics V2 - Advanced Dashboard</title>
    
    <!-- React and dependencies -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Material-UI -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Roboto:300,400,500,700&display=swap" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons" />
    <script src="https://unpkg.com/@mui/material@latest/umd/material-ui.production.min.js"></script>
    
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    
    <!-- Recharts for React -->
    <script src="https://unpkg.com/recharts@2.10.0/dist/Recharts.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Roboto', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        
        #root {
            width: 100%;
            min-height: 100vh;
        }
        
        .dashboard-container {
            padding: 20px;
            max-width: 1800px;
            margin: 0 auto;
        }
        
        .header {
            background: rgba(255, 255, 255, 0.95);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            margin-bottom: 30px;
            text-align: center;
        }
        
        .header h1 {
            color: #667eea;
            font-size: 2.5rem;
            margin-bottom: 10px;
            font-weight: 700;
        }
        
        .header p {
            color: #666;
            font-size: 1.1rem;
        }
        
        .version-switcher {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 20px 0;
        }
        
        .version-btn {
            padding: 12px 30px;
            font-size: 1rem;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
        }
        
        .version-btn.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        
        .version-btn:not(.active) {
            background: #e0e0e0;
            color: #666;
        }
        
        .version-btn:hover:not(.active) {
            background: #d0d0d0;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: rgba(255, 255, 255, 0.95);
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
            transition: transform 0.3s ease;
        }
        
        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        
        .stat-card h3 {
            color: #666;
            font-size: 0.9rem;
            text-transform: uppercase;
            margin-bottom: 10px;
        }
        
        .stat-card .value {
            font-size: 2rem;
            font-weight: 700;
            color: #667eea;
        }
        
        .stat-card .change {
            font-size: 0.9rem;
            margin-top: 5px;
        }
        
        .positive {
            color: #4caf50;
        }
        
        .negative {
            color: #f44336;
        }
        
        .chart-container {
            background: rgba(255, 255, 255, 0.95);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
            margin-bottom: 30px;
        }
        
        .chart-container h2 {
            color: #333;
            margin-bottom: 20px;
            font-size: 1.5rem;
        }
        
        .crypto-table {
            background: rgba(255, 255, 255, 0.95);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
            overflow-x: auto;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
        }
        
        th {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px;
            text-align: left;
            font-weight: 600;
        }
        
        td {
            padding: 15px;
            border-bottom: 1px solid #e0e0e0;
        }
        
        tr:hover {
            background: #f5f5f5;
        }
        
        .loading {
            text-align: center;
            padding: 50px;
            font-size: 1.5rem;
            color: white;
        }
        
        .error {
            background: #f44336;
            color: white;
            padding: 20px;
            border-radius: 10px;
            margin: 20px 0;
            text-align: center;
        }
        
        .websocket-status {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-left: 10px;
        }
        
        .websocket-status.connected {
            background: #4caf50;
            box-shadow: 0 0 10px #4caf50;
        }
        
        .websocket-status.disconnected {
            background: #f44336;
        }
        
        .badge {
            display: inline-block;
            padding: 5px 10px;
            border-radius: 15px;
            font-size: 0.8rem;
            font-weight: 600;
        }
        
        .badge.bullish {
            background: #4caf50;
            color: white;
        }
        
        .badge.bearish {
            background: #f44336;
            color: white;
        }
        
        .badge.neutral {
            background: #ff9800;
            color: white;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        const { LineChart, Line, BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip, Legend, ResponsiveContainer } = Recharts || {};

        // Main Dashboard Component
        function Dashboard() {
            const [version, setVersion] = useState('v2');
            const [cryptoData, setCryptoData] = useState([]);
            const [loading, setLoading] = useState(true);
            const [error, setError] = useState(null);
            const [wsConnected, setWsConnected] = useState(false);
            const [stats, setStats] = useState({
                totalAssets: 0,
                totalMarketCap: 0,
                avgChange24h: 0,
                topGainer: null,
                topLoser: null
            });
            const wsRef = useRef(null);

            // Fetch initial data
            useEffect(() => {
                if (version === 'v2') {
                    fetchV2Data();
                    connectWebSocket();
                } else {
                    fetchV1Data();
                }

                return () => {
                    if (wsRef.current) {
                        wsRef.current.close();
                    }
                };
            }, [version]);

            const fetchV2Data = async () => {
                try {
                    setLoading(true);
                    const response = await fetch('/api/v2/crypto/latest?limit=50');
                    const result = await response.json();
                    
                    if (result.data) {
                        setCryptoData(result.data);
                        calculateStats(result.data);
                    }
                    setLoading(false);
                } catch (err) {
                    setError('Failed to fetch V2 data: ' + err.message);
                    setLoading(false);
                }
            };

            const fetchV1Data = async () => {
                try {
                    setLoading(true);
                    const response = await fetch('http://localhost:5003/api/crypto/latest?limit=50');
                    const data = await response.json();
                    setCryptoData(data);
                    calculateStats(data);
                    setLoading(false);
                } catch (err) {
                    setError('Failed to fetch V1 data. Make sure V1 dashboard is running on port 5003');
                    setLoading(false);
                }
            };

            const connectWebSocket = () => {
                if (wsRef.current) {
                    wsRef.current.close();
                }

                try {
                    // Use relative WebSocket URL to work with any host
                    const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
                    const wsUrl = `${protocol}//${window.location.host}/ws/updates`;
                    const ws = new WebSocket(wsUrl);
                    
                    ws.onopen = () => {
                        console.log('WebSocket connected');
                        setWsConnected(true);
                        
                        // Send ping every 30 seconds
                        setInterval(() => {
                            if (ws.readyState === WebSocket.OPEN) {
                                ws.send('ping');
                            }
                        }, 30000);
                    };

                    ws.onmessage = (event) => {
                        try {
                            const message = JSON.parse(event.data);
                            if (message.type === 'price_update' && message.data) {
                                setCryptoData(message.data);
                                calculateStats(message.data);
                            }
                        } catch (err) {
                            console.error('WebSocket message error:', err);
                        }
                    };

                    ws.onerror = (error) => {
                        console.error('WebSocket error:', error);
                        setWsConnected(false);
                    };

                    ws.onclose = () => {
                        console.log('WebSocket disconnected');
                        setWsConnected(false);
                        
                        // Reconnect after 5 seconds
                        setTimeout(() => {
                            if (version === 'v2') {
                                connectWebSocket();
                            }
                        }, 5000);
                    };

                    wsRef.current = ws;
                } catch (err) {
                    console.error('WebSocket connection error:', err);
                }
            };

            const calculateStats = (data) => {
                if (!data || data.length === 0) return;

                const totalAssets = data.length;
                const totalMarketCap = data.reduce((sum, item) => sum + (item.market_cap || 0), 0);
                const avgChange24h = data.reduce((sum, item) => sum + (item.price_change_percentage_24h || 0), 0) / totalAssets;
                
                const sorted = [...data].sort((a, b) => 
                    (b.price_change_percentage_24h || 0) - (a.price_change_percentage_24h || 0)
                );
                
                setStats({
                    totalAssets,
                    totalMarketCap,
                    avgChange24h,
                    topGainer: sorted[0],
                    topLoser: sorted[sorted.length - 1]
                });
            };

            const formatNumber = (num) => {
                if (num >= 1e12) return '$' + (num / 1e12).toFixed(2) + 'T';
                if (num >= 1e9) return '$' + (num / 1e9).toFixed(2) + 'B';
                if (num >= 1e6) return '$' + (num / 1e6).toFixed(2) + 'M';
                if (num >= 1e3) return '$' + (num / 1e3).toFixed(2) + 'K';
                return '$' + num.toFixed(2);
            };

            if (loading) {
                return <div className="loading">Loading advanced analytics...</div>;
            }

            return (
                <div className="dashboard-container">
                    <div className="header">
                        <h1>🚀 Big Data Financial Analytics Platform</h1>
                        <p>University of Prishtina - FSHMN | Shaban Ejupi & Majlinda Bajraktari</p>
                        
                        <div className="version-switcher">
                            <button 
                                className={`version-btn ${version === 'v1' ? 'active' : ''}`}
                                onClick={() => setVersion('v1')}
                            >
                                V1 (2025) - Flask Classic
                            </button>
                            <button 
                                className={`version-btn ${version === 'v2' ? 'active' : ''}`}
                                onClick={() => setVersion('v2')}
                            >
                                V2 (2030) - Advanced AI
                                {version === 'v2' && (
                                    <span className={`websocket-status ${wsConnected ? 'connected' : 'disconnected'}`}></span>
                                )}
                            </button>
                        </div>
                        
                        {version === 'v2' && (
                            <p style={{marginTop: '10px', fontSize: '0.9rem', color: '#4caf50'}}>
                                ⚡ Real-time updates | 🤖 Advanced ML | 📊 Quantum-inspired optimization
                            </p>
                        )}
                    </div>

                    {error && <div className="error">{error}</div>}

                    <div className="stats-grid">
                        <div className="stat-card">
                            <h3>Total Assets</h3>
                            <div className="value">{stats.totalAssets}</div>
                        </div>
                        
                        <div className="stat-card">
                            <h3>Total Market Cap</h3>
                            <div className="value">{formatNumber(stats.totalMarketCap)}</div>
                        </div>
                        
                        <div className="stat-card">
                            <h3>Avg 24h Change</h3>
                            <div className={`value ${stats.avgChange24h >= 0 ? 'positive' : 'negative'}`}>
                                {stats.avgChange24h >= 0 ? '+' : ''}{stats.avgChange24h.toFixed(2)}%
                            </div>
                        </div>
                        
                        {stats.topGainer && (
                            <div className="stat-card">
                                <h3>Top Gainer</h3>
                                <div className="value positive">{stats.topGainer.symbol}</div>
                                <div className="change positive">
                                    +{stats.topGainer.price_change_percentage_24h?.toFixed(2)}%
                                </div>
                            </div>
                        )}
                        
                        {stats.topLoser && (
                            <div className="stat-card">
                                <h3>Top Loser</h3>
                                <div className="value negative">{stats.topLoser.symbol}</div>
                                <div className="change negative">
                                    {stats.topLoser.price_change_percentage_24h?.toFixed(2)}%
                                </div>
                            </div>
                        )}
                    </div>

                    <div className="crypto-table">
                        <h2>💰 Cryptocurrency Market Overview</h2>
                        <table>
                            <thead>
                                <tr>
                                    <th>#</th>
                                    <th>Name</th>
                                    <th>Symbol</th>
                                    <th>Price</th>
                                    <th>24h Change</th>
                                    <th>Market Cap</th>
                                    <th>Volume</th>
                                    {version === 'v2' && <th>Trend</th>}
                                </tr>
                            </thead>
                            <tbody>
                                {cryptoData.slice(0, 20).map((crypto, index) => (
                                    <tr key={crypto.symbol || index}>
                                        <td>{index + 1}</td>
                                        <td>{crypto.name || 'N/A'}</td>
                                        <td><strong>{crypto.symbol || 'N/A'}</strong></td>
                                        <td>{formatNumber(crypto.current_price || 0)}</td>
                                        <td className={crypto.price_change_percentage_24h >= 0 ? 'positive' : 'negative'}>
                                            {crypto.price_change_percentage_24h >= 0 ? '+' : ''}
                                            {crypto.price_change_percentage_24h?.toFixed(2) || '0.00'}%
                                        </td>
                                        <td>{formatNumber(crypto.market_cap || 0)}</td>
                                        <td>{formatNumber(crypto.total_volume || 0)}</td>
                                        {version === 'v2' && (
                                            <td>
                                                <span className={`badge ${
                                                    crypto.price_change_percentage_24h > 5 ? 'bullish' :
                                                    crypto.price_change_percentage_24h < -5 ? 'bearish' : 'neutral'
                                                }`}>
                                                    {crypto.price_change_percentage_24h > 5 ? 'Bullish' :
                                                     crypto.price_change_percentage_24h < -5 ? 'Bearish' : 'Neutral'}
                                                </span>
                                            </td>
                                        )}
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                    </div>
                </div>
            );
        }

        // Render the app
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<Dashboard />);
    </script>
</body>
</html>
